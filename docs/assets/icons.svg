<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ── BRAND ─────────────────────────────────────────────── -->
  <symbol id="seal-diamond" viewBox="0 0 24 24">
    <polygon points="12 2 22 12 12 22 2 12" fill="currentColor"/>
  </symbol>

  <!-- ── NAV / UI ───────────────────────────────────────────── -->
  <symbol id="arrow-back" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/>
    </g>
  </symbol>
  <symbol id="arrow-up" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5"/><path d="M5 12l7-7 7 7"/>
    </g>
  </symbol>
  <symbol id="search" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </g>
  </symbol>

  <!-- ── SKILL / PLAQUE ─────────────────────────────────────── -->
  <symbol id="github" viewBox="0 0 16 16">
    <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </symbol>
  <symbol id="copy" viewBox="0 0 16 16">
    <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2"/>
    </g>
  </symbol>
  <symbol id="check" viewBox="0 0 16 16">
    <g fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 8l4 4 8-8"/>
    </g>
  </symbol>
  <symbol id="info" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
    </g>
  </symbol>

  <!-- ── ORIGIN BADGE — laurel wreath + #1 (the "new" badge) ── -->
  <!--
    Design: classic #1 award medallion.
    Left+right laurel branches frame a centered bold "1" numeral.
    Uses stroke so it inherits currentColor (honor-red #ef4444).
  -->
  <symbol id="origin-badge" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <!-- numeral 1 with serif base -->
      <line x1="12" y1="15" x2="12" y2="8.5"/>
      <path d="M10.5 10 12 8.5"/>
      <line x1="10.5" y1="15.5" x2="13.5" y2="15.5"/>
      <!-- left laurel -->
      <path d="M7 9.5 C5.5 10 5 11.5 5.5 13"/>
      <path d="M6 12  C4.5 13 4.5 14.5 5.5 15.5"/>
      <path d="M6.5 15 C5.5 16.2 5.8 17.5 7 18"/>
      <!-- right laurel -->
      <path d="M17 9.5 C18.5 10 19 11.5 18.5 13"/>
      <path d="M18 12  C19.5 13 19.5 14.5 18.5 15.5"/>
      <path d="M17.5 15 C18.5 16.2 18.2 17.5 17 18"/>
      <!-- base ribbon -->
      <path d="M8 18.5 Q12 19.5 16 18.5"/>
    </g>
  </symbol>

  <!-- ── SHARE ──────────────────────────────────────────────── -->
  <symbol id="share" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7"/>
      <path d="M16 6l-4-4-4 4"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </g>
  </symbol>
  <symbol id="download" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
      <path d="M7 10l5 5 5-5"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </g>
  </symbol>
  <symbol id="link" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
    </g>
  </symbol>
  <symbol id="badge-soon" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M8 12h4M14 9l2 3-2 3"/>
    </g>
  </symbol>

  <!-- ── SORT CONTROLS ─────────────────────────────────────── -->
  <symbol id="sort-rank" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
    </g>
  </symbol>
  <symbol id="sort-alpha" viewBox="0 0 24 24">
    <g fill="currentColor" font-family="'Inter',system-ui,sans-serif" font-weight="700">
      <text x="2" y="10" font-size="8">A</text>
      <text x="2" y="20" font-size="8">Z</text>
    </g>
    <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 3v18"/><path d="M12.5 17.5L16 21l3.5-3.5"/>
    </g>
  </symbol>
  <symbol id="sort-type" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="8" height="8" rx="1.5"/>
      <rect x="13" y="3" width="8" height="8" rx="4"/>
      <polygon points="7 15 3 21 11 21"/>
      <path d="M13 18h8M17 14v8"/>
    </g>
  </symbol>

  <!-- ── TIMELINE ──────────────────────────────────────────── -->
  <symbol id="timeline" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="3" x2="12" y2="21"/>
      <circle cx="12" cy="7" r="2" fill="currentColor"/>
      <circle cx="12" cy="13" r="2" fill="currentColor"/>
      <circle cx="12" cy="19" r="2" fill="currentColor"/>
      <line x1="12" y1="7" x2="19" y2="7"/>
      <line x1="12" y1="13" x2="19" y2="13"/>
      <line x1="12" y1="19" x2="19" y2="19"/>
    </g>
  </symbol>

</svg>
